# .github/workflows/publish_image.yml
name: Build & push PSOPT image
on:
  push:
    paths: [ Dockerfile, .github/workflows/publish_image.yml ]

permissions:                    # needed for GHCR
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (for multi‑arch)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # Hardcoded (lowercase) to match the image ci.yml pulls; the previous
          # ${{ github.repository_owner.toLower() }} is not valid expression
          # syntax (no toLower() method) and would not resolve correctly.
          tags: ghcr.io/psopt/psopt-ci:latest
