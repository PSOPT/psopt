name: Build‑and‑test 

permissions:
  contents: read      # already default, but keep explicit
  packages: read      # ✔ allows pulling private GHCR images


# ────────── TRIGGERS ────────────────────────────────────────────── 
on:
  push:
    branches: [master]           # run on pushes to master
    paths-ignore:
      - 'README.md'    
  pull_request:
    branches: [master]           # run on PRs targeting master
    paths-ignore:
      - 'README.md'   
  workflow_dispatch:             # manual “Run workflow” button
  schedule:                      # nightly 02:30 UTC
    - cron: '30 2 * * *'
# ──────────────────────────────────────────────────────────────────

jobs:
  build:
    runs-on: ubuntu-latest       # GitHub‑hosted runner
    # Use your pre‑built Manjaro/Arch container so pacman/yay are available
    container:
      image: ghcr.io/psopt/psopt-ci:latest    # <- change if necessary

    strategy:
      matrix:
        build_type: [Release]    # add Debug if desired

    env:
      EXAMPLES:  "twoburn,low_thrust,zpm,shuttle_reentry,launch,manutec"
      # One reference cost per example, in the same order. "none" marks a
      # run-only example: it must still build and converge, but its cost is not
      # checked. notorious is a parameter-estimation problem with randomly
      # generated noisy measurements, so its least-squares residual is not a
      # portable invariant (it varies with the platform RNG) even though the
      # estimated parameter correctly recovers pi.
      REF_COSTS: "-2.367249e-01,-2.203380e-01,6.680110e+06,-3.414119e+01,-7.529661e+03,2.040420e+01"

    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe for git
        # Fixes the "detected dubious ownership in repository" git error inside the
        # container (the checked-out workspace is owned by a different uid than the
        # job user). Without this, PSOPT's CMake git-describe fails and the version
        # string falls back to a bare date.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Ensure CppAD is available
        # ci.yml builds inside the pre-baked ghcr.io/psopt/psopt-ci image. Until that
        # image is rebuilt (via publish_image.yml) to include CppAD, install it here so
        # the AD backend is present regardless of image state. Once CppAD is baked into
        # the image under /usr, this step detects it and becomes a fast no-op. CppAD is
        # built from source (not the AUR) so libcppad_lib -- which PSOPT links -- is
        # guaranteed present. Note: CppAD uses 'cppad_prefix', not CMAKE_INSTALL_PREFIX.
        run: |
          if [ -f /usr/include/cppad/cppad.hpp ] && \
             find /usr/lib /usr/lib64 -name 'libcppad_lib.*' 2>/dev/null | grep -q .; then
            echo "CppAD already present in image; skipping build."
          else
            echo "CppAD not found in image; building from source and installing to /usr."
            git clone --depth 1 https://github.com/coin-or/CppAD.git /tmp/cppad-src
            cd /tmp/cppad-src && mkdir build && cd build
            cmake -D cppad_prefix=/usr ..
            make -j"$(nproc)"
            make install
            cd / && rm -rf /tmp/cppad-src
          fi

      - name: Configure
        run: |
          cmake -B build \
          -DBUILD_EXAMPLES=ON \
          -DHEADLESS=ON \
          -DPSOPT_STRICT_WARNINGS=ON \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_BUILD_RPATH_USE_ORIGIN=ON \
          -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=ON

      - name: Build
        run: cmake --build build -j$(nproc)
        
      - name: Ensure python is available
        run: |
          # python is baked into the CI image (see Dockerfile). This guard keeps
          # the workflow working on older images that predate that change: if
          # python is missing, install it at runtime. The fallback first
          # bootstraps the pacman keyring (the old image's was never initialised,
          # so the archlinux-keyring hook fails with "no secret key available to
          # sign with"), then overwrites the forward-compatible libgcc/libstdc++
          # files that conflict with the image's older monolithic gcc-libs.
          if command -v python >/dev/null 2>&1; then
            echo "python already present: $(python --version)"
          else
            echo "python not found; installing at runtime (pre-bake image)"
            pacman-key --init
            pacman-key --populate
            pacman -Sy --noconfirm archlinux-keyring
            pacman -S  --noconfirm \
              --overwrite '/usr/lib/libgcc_s.so*' \
              --overwrite '/usr/lib/libstdc++.so*' \
              python
          fi
        
      - name: Debug one executable
        run: |
         file build/examples/twoburn/twoburn
         ldd  build/examples/twoburn/twoburn || true        

      - name: Run selected examples & parse results
        env:
         LD_LIBRARY_PATH: ${{ github.workspace }}/build/lib   # ← add this
        run: |
         python .github/scripts/run_examples.py \
         --exe-dir build/examples \
         --summary build/test_summary.json

      - name: Upload solution files & summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: psopt-logs
          path: |
            build/examples/**/psopt_solution_*.txt
            build/test_summary.json

  publish:
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    steps:
      # 1) Check out gh-pages and persist GITHUB_TOKEN so we can push
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      # 2) Download the test_summary.json artefact
      - name: Download summary
        uses: actions/download-artifact@v7
        with:
          name: psopt-logs
          path: tmp_summary

      # 3) Copy test_summary.json into artifacts/
      - name: Copy test_summary.json
        run: |
          mkdir -p artifacts
          SUMMARY=$(find tmp_summary -type f -name 'test_summary.json' | head -n1)
          if [ -z "$SUMMARY" ]; then
            echo "::error ::test_summary.json not found"
            exit 1
          fi
          cp "$SUMMARY" artifacts/test_summary.json

      - name: Build Markdown report
        run: |
          python3 - <<'PY'
          import json, pathlib
          data = json.load(open('artifacts/test_summary.json'))
          lines = ["# PSOPT CI Examples Test Summary", "", "| Example | Passed | Cost | Time (s) |", "|---|---|---|---|"]
          for name, info in data.items():
              lines.append(f"| {name} | {'✅' if info['passed'] else '❌'} | {info['cost']} | {info['elapsed_s']:.2f} |")
          pathlib.Path('artifacts/README.md').write_text("\n".join(lines))
          print("👉 Generated artifacts/README.md")
          PY
      # 4) Generate examples_badge.json from test_summary.json
      - name: Build badge JSON
        run: |
          python3 - <<'PY'
          import json, pathlib
          data = json.load(open('artifacts/test_summary.json'))
          total  = len(data)
          passed = sum(1 for v in data.values() if v.get("passed"))
          badge  = {
            "schemaVersion": 1,
            "label": "Selected examples",
            "message": f"{passed}/{total} passed",
            "color": "green" if passed == total else "red"
          }
          pathlib.Path('artifacts/examples_badge.json').write_text(json.dumps(badge))
          PY

      # 5) Copy your index.html if you have one
      - name: Copy dashboard HTML
        run: |
          if [ -f tmp_summary/index.html ]; then
            cp tmp_summary/index.html artifacts/index.html
          fi

      # 6) Commit & push any changes
      - name: Commit & push artifacts
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add artifacts/*
          git commit -m "chore: update test artifacts [skip ci]" || echo "No changes to commit."
          git push origin gh-pages || echo "Nothing to push."
